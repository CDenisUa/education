  </text>

  <rect x="152" y="316" width="340" height="28" rx="10" fill="#334155"/>
  <rect x="516" y="316" width="340" height="28" rx="10" fill="#334155"/>
  <text x="180" y="335" fill="#E2E8F0" font-size="15" font-family="Arial, sans-serif" font-weight="700">
