<svg width="980" height="390" viewBox="0 0 980 390" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="390" rx="24" fill="#020617"/>
  <rect x="24" y="24" width="932" height="342" rx="20" fill="#0F172A" stroke="#1E293B"/>
  <text x="48" y="60" fill="#E2E8F0" font-size="28" font-family="Arial, sans-serif" font-weight="700">
    Frontend Layering
  </text>
  <text x="48" y="88" fill="#94A3B8" font-size="15" font-family="Arial, sans-serif">
    A practical split for large frontends: app shell, pages, features, domain and infrastructure.
  </text>

  <rect x="70" y="124" width="840" height="46" rx="14" fill="#1D4ED8" fill-opacity="0.16" stroke="#2563EB"/>
  <text x="96" y="153" fill="#DBEAFE" font-size="20" font-family="Arial, sans-serif" font-weight="700">
    App Shell
  </text>
  <text x="226" y="153" fill="#BFDBFE" font-size="14" font-family="Arial, sans-serif">
    routing, providers, auth bootstrap, layout, app-wide config
  </text>

  <rect x="96" y="188" width="788" height="46" rx="14" fill="#0F766E" fill-opacity="0.16" stroke="#0F766E"/>
  <text x="122" y="217" fill="#CCFBF1" font-size="20" font-family="Arial, sans-serif" font-weight="700">
    Pages / Screens
  </text>
  <text x="285" y="217" fill="#99F6E4" font-size="14" font-family="Arial, sans-serif">
