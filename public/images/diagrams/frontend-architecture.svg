  </text>

  <rect x="124" y="252" width="732" height="46" rx="14" fill="#7C3AED" fill-opacity="0.14" stroke="#8B5CF6"/>
  <text x="150" y="281" fill="#EDE9FE" font-size="20" font-family="Arial, sans-serif" font-weight="700">
